services:
  - type: web
    name: collabscript-socket
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run server:prod
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # After Vercel deploy, set this to your Vercel domain, e.g.:
      # https://your-project.vercel.app
      - key: CLIENT_ORIGIN
        value: "*"
